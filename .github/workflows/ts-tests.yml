name: TypeScript Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  SOLANA_VERSION: "1.18.4"

jobs:
  ts-tests:
    name: TypeScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install Solana CLI
        run: |
          wget https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar jxf solana-release-x86_64-unknown-linux-gnu.tar.bz2
          echo "$GITHUB_WORKSPACE/solana-release/bin" >> $GITHUB_PATH

      - name: Generate test keypair
        run: solana-keygen new --no-bip39-passphrase --outfile ./test-keypair.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.30.1 anchor-cli

      - name: Build programs
        run: |
          $GITHUB_WORKSPACE/solana-release/bin/solana config set --url localhost
          anchor build

      - name: Run unit tests
        env:
          ANCHOR_WALLET: ./test-keypair.json
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
        run: yarn test:unit

      - name: Run SDK tests
        env:
          ANCHOR_WALLET: ./test-keypair.json
        run: yarn workspace @stbr/sss-token run test 2>&1 | tee sdk_vitest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-test-logs
          path: sdk_vitest.log
