name: TypeScript Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  SOLANA_VERSION: "1.18.4"

jobs:
  ts-tests:
    name: TypeScript Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Generate test keypair
        run: solana-keygen new --no-bip39-passphrase --outfile ./test-keypair.json

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        env:
          ANCHOR_WALLET: ./test-keypair.json
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
        run: yarn test:unit

      - name: Run SDK tests
        env:
          ANCHOR_WALLET: ./test-keypair.json
        run: yarn workspace @stbr/sss-token run test 2>&1 | tee sdk_vitest.log

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ts-test-logs
          path: sdk_vitest.log
