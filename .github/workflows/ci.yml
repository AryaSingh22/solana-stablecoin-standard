name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SOLANA_VERSION: "1.18.4"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION: "20"

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli

      - name: Run clippy (zero warnings policy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run cargo test-sbf (sss-token)
        run: cargo test-sbf --manifest-path programs/sss-token/Cargo.toml 2>&1 | tee cargo_test_sbf_sss_token.log

      - name: Run cargo test-sbf (transfer-hook)
        run: cargo test-sbf --manifest-path programs/transfer-hook/Cargo.toml 2>&1 | tee cargo_test_sbf_transfer_hook.log

      - name: Upload SBF test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-test-sbf-logs
          path: |
            cargo_test_sbf_sss_token.log
            cargo_test_sbf_transfer_hook.log

  typescript-checks:
    name: TypeScript Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: TypeScript check (SDK)
        run: |
          yarn workspace @stbr/sss-token run typecheck
          yarn workspace @stbr/sss-token run build

      - name: TypeScript check (CLI)
        run: yarn workspace @stbr/sss-cli run typecheck

      - name: Run tests
        run: yarn test
