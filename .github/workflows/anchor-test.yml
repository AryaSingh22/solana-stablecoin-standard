name: Anchor Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  anchor-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana CLI
        run: |
          curl -sSfL --retry 5 --retry-delay 2 --retry-connrefused -o install_solana.sh https://release.solana.com/stable/install
          sh install_solana.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.30.1 anchor-cli

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate test keypair
        run: |
          mkdir -p ~/.config/solana
          $HOME/.local/share/solana/install/active_release/bin/solana-keygen new --no-bip39-passphrase --outfile ~/.config/solana/id.json
          $HOME/.local/share/solana/install/active_release/bin/solana config set --url localnet

      - name: Build programs
        run: anchor build

      - name: Run anchor tests
        run: anchor test 2>&1 | tee evidence/logs/anchor-test-ci.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-test-results
          path: evidence/logs/anchor-test-ci.txt
