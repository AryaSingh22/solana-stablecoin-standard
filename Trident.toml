[test]
# Number of iterations for each fuzz target
fuzz_iterations = 10000

# Timeout per fuzz iteration in seconds
timeout = 10

# Seed for reproducibility
seed = 0

[fuzz]
# Allow cross-instruction fuzzing
allow_duplicate_txs = false

# Maximum number of instructions per transaction
max_instructions_per_tx = 5

[accounts_snapshots]
# Path for storing account state snapshots during fuzzing
filepath = "trident-tests/snapshots"
